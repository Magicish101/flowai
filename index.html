<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FlowAI"/>
<meta name="theme-color" content="#0f0e17"/>
<title>FlowAI — Beat Procrastination with AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0e17;--bg2:#1a1927;--bg3:#232235;--surface:#2a2840;--surface2:#323050;
  --accent:#7c6af7;--accent2:#a594f9;--accent3:#c4b8ff;
  --coral:#ff6b6b;--coral2:#ff8e8e;--mint:#43d9a2;--mint2:#6ee7bc;
  --amber:#ffd166;--amber2:#ffe099;
  --text:#f0eeff;--text2:#b8b3d8;--text3:#7a748f;
  --border:rgba(124,106,247,0.18);--border2:rgba(124,106,247,0.35);
  --radius:14px;--radius-sm:8px;
  --font-head:'Roboto',sans-serif;--font-body:'Roboto',sans-serif;
  --glow:0 0 20px rgba(124,106,247,0.25);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(124,106,247,0.12) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 80% 80%,rgba(67,217,162,0.07) 0%,transparent 60%);pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
h1,h2,h3{font-family:var(--font-head)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:99px}
input,select,textarea{font-family:var(--font-body);font-size:14px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;appearance:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,247,0.2)}
input[type=range]{padding:0;height:6px;background:var(--surface2);border:none;border-radius:99px;cursor:pointer;accent-color:var(--accent)}
input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
input[type=time]{padding:8px 10px;font-size:13px}
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:0.3px;font-weight:500}
select option{background:var(--bg2)}
button{font-family:var(--font-body);cursor:pointer;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);padding:9px 18px;font-size:13px;font-weight:500;transition:all .18s}
button:hover{background:var(--surface);color:var(--text);border-color:var(--accent2)}
button:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#9b8dff);color:#fff;border-color:transparent;box-shadow:0 2px 16px rgba(124,106,247,0.4);font-weight:600}
.btn-primary:hover{background:linear-gradient(135deg,#8b7aff,#b0a4ff)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ghost{border-color:transparent;color:var(--text3)}
.btn-ghost:hover{color:var(--text2);background:var(--surface)}
.btn-coral{border-color:rgba(255,107,107,0.4);color:var(--coral)}
.btn-coral:hover{background:rgba(255,107,107,0.1)}
.btn-mint{border-color:rgba(67,217,162,0.4);color:var(--mint)}
.btn-mint:hover{background:rgba(67,217,162,0.1)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500}
.badge-school{background:rgba(124,106,247,0.2);color:var(--accent3);border:1px solid rgba(124,106,247,0.3)}
.badge-extra{background:rgba(67,217,162,0.15);color:var(--mint2);border:1px solid rgba(67,217,162,0.25)}
.badge-personal{background:rgba(255,209,102,0.15);color:var(--amber2);border:1px solid rgba(255,209,102,0.25)}
.badge-high{background:rgba(255,107,107,0.2);color:var(--coral2);border:1px solid rgba(255,107,107,0.3)}
.badge-med{background:rgba(255,209,102,0.15);color:var(--amber2);border:1px solid rgba(255,209,102,0.25)}
.badge-low{background:rgba(67,217,162,0.15);color:var(--mint2);border:1px solid rgba(67,217,162,0.25)}
.nav{position:sticky;top:0;z-index:100;background:rgba(15,14,23,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;height:56px;gap:4px}
.nav-tab{padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .18s;white-space:nowrap}
.nav-tab.active{background:var(--surface);color:var(--accent2);box-shadow:inset 0 0 0 1px var(--border2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:1.5rem;width:100%;max-width:500px;max-height:90dvh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.6),var(--glow)}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:480px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-val{font-family:var(--font-head);font-size:28px;font-weight:800;margin-top:4px}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;transition:border-color .18s,box-shadow .18s}
.task-card:hover{border-color:var(--border2);box-shadow:var(--glow)}
.task-card.done{opacity:0.5}
.pattern-card{border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.pattern-high{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3)}
.pattern-med{background:rgba(255,209,102,0.08);border:1px solid rgba(255,209,102,0.25)}
.pattern-low{background:rgba(67,217,162,0.08);border:1px solid rgba(67,217,162,0.25)}
.brain-box{background:rgba(124,106,247,0.08);border:1px solid rgba(124,106,247,0.25);border-radius:var(--radius-sm);padding:10px 14px;margin-top:8px;font-size:12px;line-height:1.7;color:var(--accent3)}
.brain-box strong{font-weight:600;color:var(--accent2)}
.ai-panel{background:linear-gradient(135deg,rgba(124,106,247,0.1),rgba(67,217,162,0.06));border:1px solid rgba(124,106,247,0.3);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;letter-spacing:0.5px}
.cal-cell{min-height:56px;padding:5px;border-radius:8px;background:var(--bg2);border:1px solid var(--border)}
.cal-cell.today{border-color:var(--accent);background:rgba(124,106,247,0.1)}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-num{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:3px}
.cal-cell.today .cal-num{color:var(--accent2);font-weight:700}
.cal-dot{font-size:9px;padding:1px 5px;border-radius:4px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sched-day{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.sched-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border)}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--mint);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.prog-bar{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--mint))}
.divider{height:1px;background:var(--border);margin:16px 0}
.tag-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tag-row::-webkit-scrollbar{display:none}
.main{max-width:720px;margin:0 auto;padding:1.25rem 1rem 5rem}
@media(max-width:400px){.main{padding:.75rem .75rem 5rem}}
.shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.gcal-btn{display:flex;align-items:center;gap:6px;border-color:rgba(67,217,162,0.35);color:var(--mint2);font-size:12px;padding:6px 11px}
.gcal-btn:hover{background:rgba(67,217,162,0.1)}
.gcal-btn.connected{border-color:rgba(67,217,162,0.5);color:var(--mint)}
.gcal-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:rgba(67,217,162,0.12);color:var(--mint2);border:1px solid rgba(67,217,162,0.25);padding:2px 7px;border-radius:99px}
.import-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.import-row:last-child{border-bottom:none}
/* ── Login screen ── */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;padding:2rem;transition:opacity .4s}
.login-screen::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(124,106,247,0.18) 0%,transparent 65%),radial-gradient(ellipse 40% 40% at 20% 80%,rgba(67,217,162,0.08) 0%,transparent 60%);pointer-events:none}
.login-logo{font-family:var(--font-head);font-size:52px;font-weight:800;color:var(--accent2);letter-spacing:-2px;margin-bottom:6px;animation:fadeUp .5s ease both}
.login-tagline{font-size:14px;color:var(--text3);margin-bottom:44px;text-align:center;animation:fadeUp .5s .1s ease both}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:1.75rem;width:100%;max-width:340px;box-shadow:0 24px 60px rgba(0,0,0,0.5),var(--glow);animation:fadeUp .5s .15s ease both;position:relative;z-index:1}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:18px 0 20px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px rgba(124,106,247,0.7)}
.pin-dot.error{background:var(--coral);border-color:var(--coral)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.numpad-btn{background:var(--bg3);border:1px solid var(--border);border-radius:12px;height:58px;font-size:22px;font-family:var(--font-head);font-weight:600;color:var(--text);cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;width:100%}
.numpad-btn:hover{background:var(--surface);border-color:var(--accent2);color:var(--accent2)}
.numpad-btn:active{transform:scale(0.93)}
.numpad-btn.del{font-size:16px;color:var(--text3)}
.numpad-btn.del:hover{color:var(--coral);border-color:rgba(255,107,107,0.4)}
.numpad-btn.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
</style>

<body>
<div id="root"></div>
<div id="modal-layer"></div>
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>
<script>
/* ── Utilities ─────────────────────────────────────────────────────── */
function genId(){return Math.random().toString(36).slice(2,9)}
function todayStr(){return new Date().toISOString().split('T')[0]}
function daysLeft(d){return Math.ceil((new Date(d)-new Date())/86400000)}
function priorityScore(t){
  const dl=Math.max(0,daysLeft(t.dueDate));
  const u=dl===0?10:dl<=1?8:dl<=3?6:dl<=7?4:2;
  return u*0.5+(t.importance||3)*0.35+(6-(t.estimatedHours||1))*0.15;
}
function getWeekStart(){
  const n=new Date(),day=n.getDay(),d=new Date(n);
  d.setDate(n.getDate()+(day===0?-6:1-day));d.setHours(0,0,0,0);return d;
}
function fmt(str){if(!str)return'';return new Date(str+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function toMins(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m}
function toTime(m){return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
function blockHours(blocks){return(blocks||[]).reduce((s,b)=>{const d=(toMins(b.end)-toMins(b.start))/60;return s+(d>0?d:0)},0)}

/* ── Storage ───────────────────────────────────────────────────────── */
function ld(k,d){try{const v=localStorage.getItem('fl_'+k);return v?JSON.parse(v):d}catch{return d}}
function sv(k,v){try{localStorage.setItem('fl_'+k,JSON.stringify(v))}catch{}}

/* ── Brain science ─────────────────────────────────────────────────── */
const BRAIN={
  effort_avoidance:{title:'Effort avoidance',icon:'🧠',desc:'Your brain keeps pushing back the big tasks.',
    brain:'<strong>Why your brain does this:</strong> Your limbic system generates a threat response when facing high-effort tasks — predicting discomfort before you even start. This is called <strong>effort discounting</strong>.',
    fix:'Try the 2-minute rule: just open the document. Starting triggers dopamine which overrides the threat signal.'},
  easy_first:{title:'Easy-first bias',icon:'⚖️',desc:'You complete easy tasks while avoiding the important ones.',
    brain:'<strong>Why your brain does this:</strong> Easy tasks release <strong>dopamine</strong>, giving a false sense of productivity. Your brain learns "easy = reward" — called <strong>cognitive ease bias</strong>.',
    fix:'Schedule your hardest task first each morning before anything else. This is called "eating the frog."'},
  repeat_delay:{title:'Repeat delays',icon:'🔁',desc:'The same task keeps getting pushed back.',
    brain:'<strong>Why your brain does this:</strong> Each delay reinforces avoidance. The longer a task sits, the more psychological weight it accumulates — called the <strong>Zeigarnik load</strong>.',
    fix:'Break the task into a step so small it feels silly — like "open the doc and write one sentence."'},
  overdue_pile:{title:'Overdue pile-up',icon:'⏰',desc:'Multiple tasks have passed their due date.',
    brain:'<strong>Why your brain does this:</strong> Too many urgent items causes <strong>decision paralysis</strong>. Stress hormones (cortisol) impair the prefrontal cortex — the region needed to plan.',
    fix:'Pick ONE task — the smallest overdue item — and do just that. Clearing one lowers cortisol and restores planning.'}
};

/* ── Default week slots ────────────────────────────────────────────── */
function defaultSlots(){
  const today=new Date();today.setHours(0,0,0,0);
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return Array.from({length:7},(_,i)=>{
    const date=new Date(today.getTime()+i*86400000);
    const dayName=DAYS[date.getDay()];
    const dateStr=date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const isWeekend=date.getDay()===0||date.getDay()===6;
    const blocks=isWeekend
      ?[{id:genId(),start:'10:00',end:'12:00'}]
      :[{id:genId(),start:'15:00',end:'17:00'},{id:genId(),start:'19:00',end:'21:00'}];
    return{day:dayName,date:dateStr,blocks};
  });
}

/* ── App state ─────────────────────────────────────────────────────── */
const S={
  tasks:ld('tasks',[
    {id:'t1',title:'History essay',dueDate:new Date(Date.now()+2*864e5).toISOString().split('T')[0],estimatedHours:3,importance:4,category:'school',notes:'3000 words on WWII',subtasks:[{id:'s1',title:'Create outline',done:false},{id:'s2',title:'Draft intro',done:false}],done:false,createdAt:Date.now()},
    {id:'t2',title:'Math problem set',dueDate:new Date(Date.now()+1*864e5).toISOString().split('T')[0],estimatedHours:1.5,importance:5,category:'school',notes:'Ch 8–9',subtasks:[],done:false,createdAt:Date.now()},
    {id:'t3',title:'Soccer practice plan',dueDate:new Date(Date.now()+4*864e5).toISOString().split('T')[0],estimatedHours:0.5,importance:2,category:'extracurricular',notes:'',subtasks:[],done:false,createdAt:Date.now()},
    {id:'t4',title:'Clean room',dueDate:new Date(Date.now()-864e5).toISOString().split('T')[0],estimatedHours:0.5,importance:1,category:'personal',notes:'',subtasks:[],done:true,createdAt:Date.now()},
  ]),
  delays:ld('delays',{t2:2,t1:1}),
  weekSlots:ld('weekSlots',null),
  tab:'tasks',filter:'all',
  aiNudge:'',aiNudgeLoading:false,
  aiInsight:'',aiInsightLoading:false,
  calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),
};

function update(partial){
  Object.assign(S,partial);
  if(partial.tasks!==undefined)sv('tasks',S.tasks);
  if(partial.delays!==undefined)sv('delays',S.delays);
  if(partial.weekSlots!==undefined)sv('weekSlots',S.weekSlots);
  render();
}
window.update=update;

/* ── Pattern analysis ──────────────────────────────────────────────── */
function patterns(){
  const{tasks,delays}=S,res=[],pending=tasks.filter(t=>!t.done);
  const he=pending.filter(t=>(t.estimatedHours||1)>=2);
  if(he.length>0&&he.filter(t=>(delays[t.id]||0)>0).length/he.length>=0.5)
    res.push({...BRAIN.effort_avoidance,severity:'high'});
  const done=tasks.filter(t=>t.done);
  if(done.length>=2){
    const da=done.reduce((s,t)=>s+(t.importance||3),0)/done.length;
    const pa=pending.length?pending.reduce((s,t)=>s+(t.importance||3),0)/pending.length:0;
    if(da<pa-0.7)res.push({...BRAIN.easy_first,severity:'med'});
  }
  const rd=pending.filter(t=>(delays[t.id]||0)>=2);
  if(rd.length>0){
    const w=rd.sort((a,b)=>(delays[b.id]||0)-(delays[a.id]||0))[0];
    res.push({...BRAIN.repeat_delay,severity:'high',taskName:w.title,delayCount:delays[w.id]||0});
  }
  if(pending.filter(t=>daysLeft(t.dueDate)<0).length>=2)
    res.push({...BRAIN.overdue_pile,severity:'high'});
  if(res.length===0)res.push({icon:'✓',title:'No patterns detected',desc:'Great job — your task habits look healthy.',brain:null,severity:'low'});
  return res;
}

/* ════════════════════════════════════════════════════════════════════
   SMART COACH — template-based, uses real task data, works everywhere
   No API key or internet connection needed for these features
   ════════════════════════════════════════════════════════════════════ */

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function nudge(){
  if(S.aiNudgeLoading)return;
  update({aiNudgeLoading:true,aiNudge:''});

  const sorted=[...S.tasks].filter(t=>!t.done).sort((a,b)=>priorityScore(b)-priorityScore(a));
  if(sorted.length===0){
    update({aiNudge:"You have no pending tasks — enjoy the break, you've earned it!",aiNudgeLoading:false});
    return;
  }

  const top=sorted[0];
  const second=sorted[1];
  const dl=daysLeft(top.dueDate);
  const overdue=dl<0;
  const urgent=dl<=1;
  const topDelays=S.delays[top.id]||0;

  // Nudge 1 — based on the #1 priority task
  const nudge1Templates=[
    overdue
      ?[`"${top.title}" is overdue — even 20 minutes on it right now will stop the pile from growing.`,
        `Your most urgent task is "${top.title}" and it's already past due — open it up and tackle just the first step.`,
        `"${top.title}" needed to be done already — start it now, even for 15 minutes, to break the cycle.`]
      :urgent
      ?[`"${top.title}" is due ${dl===0?'today':'tomorrow'} — set a timer for 25 minutes and knock out a solid chunk right now.`,
        `You have ${dl===0?'today':'until tomorrow'} for "${top.title}" — starting now gives you the best chance of finishing strong.`,
        `"${top.title}" is your most urgent task and due ${dl===0?'today':'tomorrow'} — even getting started tonight removes tomorrow\'s stress.`]
      :[`Your top priority right now is "${top.title}" (due ${fmt(top.dueDate)}) — a focused ${top.estimatedHours<=1?'30-minute':'1-hour'} session today will make a real difference.`,
        `"${top.title}" is ranked #1 this week — schedule ${top.estimatedHours<=1?'30 minutes':'an hour'} for it today before other things take over.`,
        `Block out ${top.estimatedHours<=1?'30 minutes':'1–2 hours'} for "${top.title}" today — it's your highest priority task and due ${fmt(top.dueDate)}.`]
  ];
  const n1=pick(nudge1Templates.flat?nudge1Templates:nudge1Templates[0]);

  // Nudge 2 — based on delay history, second task, or motivational
  let n2;
  if(topDelays>=2){
    n2=pick([
      `You've delayed "${top.title}" ${topDelays} times — your brain is avoiding it because it feels big, so just open it and do the first 10 minutes only.`,
      `"${top.title}" has been pushed back ${topDelays} times — that\'s your limbic system talking. Override it with just one small step today.`,
      `Every delay on "${top.title}" makes it feel heavier. Break the cycle: commit to just 15 minutes on it — nothing more.`
    ]);
  } else if(second){
    const dl2=daysLeft(second.dueDate);
    n2=pick([
      `After that, "${second.title}" is your next priority — it's due ${fmt(second.dueDate)} and needs about ${second.estimatedHours}h total.`,
      `Don't forget "${second.title}" either — it's due ${fmt(second.dueDate)} and will take around ${second.estimatedHours}h, so plan for it this week.`,
      `"${second.title}" is sitting at #2 on your list — ${dl2<=3?'it\'s coming up soon, so get ahead of it':'worth blocking time for later this week'}.`
    ]);
  } else {
    n2=pick([
      `You only have one task left — clear it and give yourself the rest of the day guilt-free.`,
      `Once you tackle "${top.title}", your week is clear — that\'s a great position to be in.`,
      `Finishing "${top.title}" will clear your entire task list — that feeling of being done is worth starting right now.`
    ]);
  }

  // Small delay to feel like it's "thinking"
  setTimeout(()=>{
    update({aiNudge: n1+'\n\n'+n2, aiNudgeLoading:false});
  }, 600);
}

function insight(){
  if(S.aiInsightLoading)return;
  update({aiInsightLoading:true,aiInsight:''});

  const pt=patterns();
  const pending=S.tasks.filter(t=>!t.done);
  const done=S.tasks.filter(t=>t.done);
  const totalDelays=Object.values(S.delays).reduce((s,v)=>s+v,0);
  const sorted=[...pending].sort((a,b)=>priorityScore(b)-priorityScore(a));
  const top=sorted[0];

  // Build paragraph 1 — describe what the data shows
  let para1='';
  const hasEffortAvoidance=pt.find(p=>p.type==='effort_avoidance'||p.title==='Effort avoidance');
  const hasEasyFirst=pt.find(p=>p.type==='easy_first'||p.title==='Easy-first bias');
  const hasRepeatDelay=pt.find(p=>p.title==='Repeat delays');
  const hasOverdue=pt.find(p=>p.title==='Overdue pile-up');
  const allHealthy=pt.find(p=>p.title==='No patterns detected');

  if(allHealthy){
    para1=pick([
      `Looking at your task history, your habits are actually in good shape right now. You\'re completing tasks across different categories and not showing signs of systematic avoidance. ${done.length>0?`You\'ve completed ${done.length} task${done.length!==1?'s':''} already, which shows real follow-through.`:''}`,
      `Your data looks healthy — no major avoidance patterns, no pile-ups, and your task mix looks balanced. ${totalDelays===0?'Zero delays recorded so far, which is impressive.':'Keep monitoring your delays to catch patterns early.'}`,
    ]);
  } else if(hasRepeatDelay && hasRepeatDelay.taskName){
    para1=pick([
      `Your task data shows a clear pattern around "${hasRepeatDelay.taskName}" — you\'ve delayed it ${hasRepeatDelay.delayCount} times now. This is classic Zeigarnik load: the longer a task sits incomplete, the more psychological weight it builds up, which paradoxically makes you avoid it more, not less. ${hasEffortAvoidance?`The pattern is even clearer because you\'re also avoiding other high-effort tasks, suggesting your brain is in effort-avoidance mode this week.`:''}`,
      `The standout pattern in your data is "${hasRepeatDelay.taskName}" being delayed ${hasRepeatDelay.delayCount} times. Your prefrontal cortex knows it\'s important, but your limbic system keeps generating a threat response when you think about starting it. ${hasEasyFirst?'Meanwhile, you tend to complete easier tasks first, which gives a false sense of productivity while the important work waits.':'This is one of the most common procrastination traps teens face.'}`,
    ]);
  } else if(hasEasyFirst){
    para1=pick([
      `Your completion patterns show an easy-first bias — the tasks you\'ve finished tend to be lower-importance than the ones still pending. Your brain is chasing the dopamine hit from completing easy tasks while avoiding the cognitive friction of harder, more important work. ${top?`Right now, "${top.title}" is sitting at the top of your priority list but hasn\'t been started.`:''}`,
      `There\'s a clear gap between what you\'re completing and what needs to get done. You\'re gravitating toward lower-stakes tasks — this is cognitive ease bias, where the brain prefers tasks that feel easier to process. ${pending.length>0?`You have ${pending.length} pending tasks, and the highest-priority ones are the ones being avoided.`:''}`,
    ]);
  } else if(hasOverdue){
    para1=pick([
      `You\'ve got a few overdue tasks building up, which is a sign of decision paralysis — when too many urgent things pile up, the brain\'s cortisol response actually impairs the prefrontal cortex, making it harder to prioritise and plan. It\'s a frustrating loop: the more overdue tasks you have, the harder it feels to start any of them.`,
      `The overdue pile is a cortisol trap — stress about undone tasks makes planning harder, which leads to more avoidance, which creates more stress. The only way out is to pick the single smallest overdue item and complete just that one thing. Even one completion lowers cortisol and restores your brain\'s planning capacity.`,
    ]);
  } else {
    para1=pick([
      `Your task patterns show some signs of effort avoidance this week — your brain is steering you away from high-effort tasks before you\'ve even started them. This is called effort discounting: the brain overestimates how unpleasant a task will be, predicts discomfort, and triggers avoidance. The reality is almost always easier than the anticipation.`,
      `Looking at your data, you\'re showing early signs of avoidance — tasks are accumulating and delays are adding up. This is normal, but worth catching early. Your brain is doing what brains do: protecting you from predicted discomfort. The trick is to make the first step so small that the threat response doesn\'t trigger.`,
    ]);
  }

  // Build paragraph 2 — 2 specific strategies
  let para2='';
  if(hasRepeatDelay && hasRepeatDelay.taskName){
    para2=pick([
      `Two strategies for your situation: First, use implementation intentions for "${hasRepeatDelay.taskName}" — instead of "I\'ll work on it later," say exactly "I will work on ${hasRepeatDelay.taskName} at [specific time] for 15 minutes." Research shows this triples follow-through. Second, shrink the task — your first session goal should be embarrassingly small, like just opening the document and reading the instructions. Starting breaks the avoidance loop.`,
      `Here\'s what the science says works for repeat delays: First, pair "${hasRepeatDelay.taskName}" with something you enjoy — work on it right before something fun, so your brain starts associating it with reward. Second, tell someone your specific plan for it today — social accountability activates a different part of the brain and dramatically increases follow-through.`,
    ]);
  } else if(hasEasyFirst){
    para2=pick([
      `Two strategies: First, try "eating the frog" — do your hardest task (${top?`"${top.title}"`:' your top priority'}) as the very first thing tomorrow, before checking any messages or doing anything else. Your willpower and focus are highest in the morning. Second, give yourself a "hard task quota" — you\'re not allowed to complete any easy task until you\'ve logged at least 30 minutes on a high-importance one.`,
      `Science-backed fixes for easy-first bias: First, reframe ${top?`"${top.title}"`:'your top task'} — instead of thinking about the whole task, only think about the next 20 minutes. Your brain evaluates tasks based on anticipated effort, so shrinking the mental frame reduces the avoidance trigger. Second, remove easy tasks from your view temporarily — hide completed items and only look at your top 3 priorities.`,
    ]);
  } else {
    para2=pick([
      `Two strategies that work: First, use the 2-minute rule as a wedge — tell yourself you\'ll only work on ${top?`"${top.title}"`:'your top task'} for 2 minutes. You almost certainly won\'t stop after 2 minutes, but the tiny commitment bypasses your brain\'s threat response and gets you started. Second, schedule a specific "focus block" in your calendar today — vague intentions don\'t activate planning circuits the way specific commitments do.`,
      `Here\'s what to try: First, set a timer for 25 minutes and work on ${top?`"${top.title}"`:'your top task'} with everything else closed — no phone, no other tabs. The Pomodoro technique works because time-boxing makes tasks feel finite and less threatening. Second, after each work session, write down exactly where you stopped and what the next step is — this closes the Zeigarnik loop and makes it much easier to restart next time.`,
    ]);
  }

  setTimeout(()=>{
    update({aiInsight: para1+'\n\n'+para2, aiInsightLoading:false});
  }, 800);
}

window.nudge=nudge;window.insight=insight;

  _sd[di].blocks[bi][field]=val;
  const b=_sd[di].blocks[bi];

  refreshDayTotal(di);

window.addBlock=function(di){
  const blocks=_sd[di].blocks;
  const lastEnd=blocks.length?blocks[blocks.length-1].end:'15:00';

  _sd[di].blocks.push({id:genId(),start:toTime(sm),end:toTime(sm+90)});

/* ════════════════════════════════════════════════════════════════════
   SMART SCHEDULE — fits tasks into actual time blocks by priority+due
   ════════════════════════════════════════════════════════════════════ */
function buildSchedule(){
  if(!S.weekSlots)return null;
  const today=new Date();today.setHours(0,0,0,0);

  const pending=[...S.tasks].filter(t=>!t.done).sort((a,b)=>{
    const au=Math.max(0,daysLeft(a.dueDate)),bu=Math.max(0,daysLeft(b.dueDate));
    if(au!==bu)return au-bu;
    return priorityScore(b)-priorityScore(a);
  });
  const remaining={};
  pending.forEach(t=>{remaining[t.id]=+(t.estimatedHours||1)});

  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Build 7 days starting from today
  return Array.from({length:7},(_,i)=>{
    const date=new Date(today.getTime()+i*86400000);
    const dateStr=date.toISOString().split('T')[0];
    const dayName=DAYS[date.getDay()];

    // Find matching slot from weekSlots by day name, or use default
    const slot=S.weekSlots.find(s=>s.day===dayName);
    const blocks=slot&&slot.blocks&&slot.blocks.length>0
      ?slot.blocks
      :[{id:'default',start:'15:00',end:'17:00'}];

    const totalFree=blockHours(blocks);
    if(totalFree===0)return{day:dayName,date:dateStr,totalFree,blocks,scheduled:[]};

    const eligible=pending.filter(t=>remaining[t.id]>0.01);
    const assignments=[];
    let minutesUsed=0;
    const totalMins=totalFree*60;

    for(const task of eligible){
      if(minutesUsed>=totalMins-14)break;
      const avail=(totalMins-minutesUsed)/60;
      const chunk=Math.min(remaining[task.id],avail,2);
      if(chunk<0.25)continue;
      const cr=Math.round(chunk*4)/4;
      remaining[task.id]=Math.max(0,remaining[task.id]-cr);
      minutesUsed+=cr*60;
      assignments.push({...task,chunk:cr,remainingAfter:Math.max(0,remaining[task.id])});
    }

    const scheduled=[];
    let bIdx=0,bUsed=0;
    for(const a of assignments){
      let need=a.chunk*60;
      while(need>0.5&&bIdx<blocks.length){
        const b=blocks[bIdx];
        const bStart=toMins(b.start),bEnd=toMins(b.end);
        const bAvail=Math.max(0,bEnd-bStart-bUsed);
        if(bAvail<1){bIdx++;bUsed=0;continue;}
        const use=Math.min(need,bAvail);
        const st=toTime(bStart+bUsed),en=toTime(bStart+bUsed+use);
        scheduled.push({...a,startTime:st,endTime:en,chunkActual:Math.round(use/60*4)/4});
        bUsed+=use;need-=use;
        if(bUsed>=bEnd-bStart){bIdx++;bUsed=0;}
      }
    }
    return{day:dayName,date:dateStr,totalFree,blocks,scheduled};
  });
}

   4. Go to APIs & Services → OAuth consent screen
      - User type: External → Fill in app name "FlowAI", your email
      - Add scope: .../auth/calendar.readonly
      - Add yourself as a test user
   5. Go to Credentials → Create Credentials → OAuth Client ID
      - Application type: Web application
      - Authorised JavaScript origins: add the URL you open the file from
        (e.g. http://localhost or chrome-extension:// or file://)
   6. Copy the Client ID and paste it below ↓
   ════════════════════════════════════════════════════════════════════ */

const GCAL_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com';
const GCAL_SCOPE     = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.calendarlist.readonly';
const GCAL_DAYS      = 30; // how far ahead to pull events

// Persisted gcal state
S.gcal = ld('gcal', { connected: false, email: '', lastSync: null });

let _gcalToken = null; // in-memory only, never stored

/* ── Token request via Google Identity Services ── */
function gcalConnect() {
  // Check localStorage for a previously saved Client ID first
  const savedId = ld('gcalClientId', '');
  const activeId = savedId || GCAL_CLIENT_ID;
  if (!activeId || activeId.startsWith('YOUR_')) {
    openGcalSetupGuide(); return;
  }
  if (!window.google?.accounts?.oauth2) {
    showToast('Google sign-in library not loaded yet. Try again in a moment.'); return;
  }
  gcalConnectWithId(activeId);
}
window.gcalConnect = gcalConnect;

function gcalDisconnect() {
  _gcalToken = null;
  sv('gcal', { connected: false, email: '', lastSync: null });
  S.gcal = { connected: false, email: '', lastSync: null };
  render();
}
window.gcalDisconnect = gcalDisconnect;

/* ── Fetch events from Google Calendar API ── */
async function gcalFetchAndImport() {
  showToast('Fetching your Google Calendar events…');
  const now    = new Date();
  const future = new Date(now.getTime() + GCAL_DAYS * 86400000);
  const tMin   = now.toISOString();
  const tMax   = future.toISOString();

  try {
    // Get user info for display
    const meRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + _gcalToken }
    });
    const me = await meRes.json();

    // Step 1: get list of ALL calendars the user has
    const calListRes = await fetch(
      'https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=50',
      { headers: { Authorization: 'Bearer ' + _gcalToken } }
    );
    const calList = await calListRes.json();

    if (calList.error) {
      showToast('Calendar error: ' + calList.error.message); return;
    }

    const calendars = (calList.items || []).filter(c =>
      c.accessRole === 'owner' || c.accessRole === 'writer' || c.accessRole === 'reader'
    );

    if (calendars.length === 0) {
      showToast('No calendars found.'); return;
    }

    showToast(`Fetching from ${calendars.length} calendar${calendars.length!==1?'s':''}…`);

    // Step 2: fetch events from each calendar in parallel
    const allEvents = [];
    const seenIds = new Set();

    await Promise.all(calendars.map(async (cal) => {
      try {
        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?`
          + `timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}`
          + `&singleEvents=true&orderBy=startTime&maxResults=100`;
        const res = await fetch(url, { headers: { Authorization: 'Bearer ' + _gcalToken } });
        const data = await res.json();
        if (data.items) {
          data.items.forEach(ev => {
            if (ev.status !== 'cancelled' && !seenIds.has(ev.id)) {
              seenIds.add(ev.id);
              // Tag with calendar name for context
              allEvents.push({ ...ev, _calendarName: cal.summary, _calendarColor: cal.backgroundColor });
            }
          });
        }
      } catch (e) {
        console.warn('Could not fetch calendar:', cal.summary, e);
      }
    }));

    // Sort all events by start time
    allEvents.sort((a, b) => {
      const aTime = a.start?.dateTime || a.start?.date || '';
      const bTime = b.start?.dateTime || b.start?.date || '';
      return aTime.localeCompare(bTime);
    });

    if (allEvents.length === 0) {
      showToast('No upcoming events found in the next 30 days.');
      sv('gcal', { connected: true, email: me.email, lastSync: new Date().toISOString() });
      S.gcal = { connected: true, email: me.email, lastSync: new Date().toISOString() };
      render(); return;
    }

    // Show import review modal
    openImportModal(allEvents, me.email);

  } catch (err) {
    showToast('Could not reach Google Calendar. Check your internet.');
    console.error(err);
  }
}

/* ── Convert a Google Calendar event → FlowAI task ── */
function gcalEventToTask(ev) {
  // Get date — handle all-day (date) vs timed (dateTime)
  const start = ev.start?.dateTime || ev.start?.date || todayStr();
  const dueDate = start.split('T')[0];

  // Guess category from calendar event keywords
  const title = (ev.summary || 'Untitled event').toLowerCase();
  let category = 'personal';
  if (/homework|essay|assignment|project|study|test|exam|quiz|due|submit|class|lecture|lab|report/.test(title))
    category = 'school';
  else if (/practice|rehearsal|club|team|game|match|training|sport|meet/.test(title))
    category = 'extracurricular';

  // Estimate duration from event length (if timed), else 1h default
  let estimatedHours = 1;
  if (ev.start?.dateTime && ev.end?.dateTime) {
    const diff = (new Date(ev.end.dateTime) - new Date(ev.start.dateTime)) / 3600000;
    estimatedHours = Math.max(0.25, Math.round(diff * 4) / 4);
  }

  return {
    id: 'gcal_' + (ev.id || genId()),
    title: ev.summary || 'Untitled event',
    dueDate,
    estimatedHours,
    importance: 3,
    category,
    notes: [ev._calendarName ? `📅 ${ev._calendarName}` : '', ev.description ? ev.description.slice(0, 180) : ''].filter(Boolean).join(' · '),
    subtasks: [],
    done: false,
    createdAt: Date.now(),
    gcalId: ev.id,
    gcalImported: true,
  };
}

/* ── Import review modal ── */

function openImportModal(events, email) {

  const existingGcalIds = new Set(S.tasks.filter(t => t.gcalId).map(t => t.gcalId));
  _importDraft = events.map(ev => ({
    ev,
    task: gcalEventToTask(ev),
    selected: !existingGcalIds.has(ev.id), // pre-select only new ones
    alreadyExists: existingGcalIds.has(ev.id),
  }));

  const ml = document.getElementById('modal-layer');
  ml.innerHTML = buildImportHTML(email);

  // Event delegation for checkboxes and sliders
  const list = document.getElementById('import-list');
  if (list) {

window.confirmImport = function(email) {
  const toAdd = _importDraft
    .filter(r => r.selected && !r.alreadyExists)
    .map(r => r.task);

    .filter(r => r.selected && r.alreadyExists)
    .map(r => r.task);

  sv('gcal', gcalState);

  update({ tasks: newTasks });

function gcalConnectWithId(clientId) {
  if (!window.google?.accounts?.oauth2) {
    showToast('Google library not loaded yet — try again in a moment.'); return;
  }
  google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: GCAL_SCOPE,
    callback: async (resp) => {
      if (resp.error) { showToast('Sign-in failed: ' + resp.error); return; }
      _gcalToken = resp.access_token;
      await gcalFetchAndImport();
    },
  }).requestAccessToken();
}

/* ════════════════════════════════════════════════════════════════════
   LOGIN SYSTEM — PIN-based, stored as a hash in localStorage
   First launch: user creates a 4-digit PIN + name
   Subsequent launches: PIN entry screen
   Session persists for 8 hours so they don't re-enter constantly
   ════════════════════════════════════════════════════════════════════ */

const AUTH = {
  pin:     ld('pin', null),       // stored as simple hash
  name:    ld('userName', ''),
  session: ld('session', 0),      // timestamp of last login
};
const SESSION_HOURS = 8;

function hashPin(pin) {
  // Simple deterministic hash — good enough for a personal local app
  let h = 0;
  for (let i = 0; i < pin.length; i++) {
    h = (Math.imul(31, h) + pin.charCodeAt(i)) | 0;
  }
  return h.toString(36);
}

function isSessionValid() {
  if (!AUTH.pin) return false; // no pin set yet
  const age = (Date.now() - AUTH.session) / 3600000;
  return age < SESSION_HOURS;
}

function startSession() {
  AUTH.session = Date.now();
  sv('session', AUTH.session);
}

/* ── PIN entry state ── */
let _pin = '';
let _pinMode = AUTH.pin ? 'enter' : 'create'; // 'create' | 'confirm' | 'enter'
let _pinConfirm = '';
let _pinName = '';
let _pinError = '';

function renderLogin() {
  const isCreate = _pinMode === 'create';
  const isConfirm = _pinMode === 'confirm';
  const isEnter = _pinMode === 'enter';

  const title = isCreate ? 'Create your PIN'
              : isConfirm ? 'Confirm your PIN'
              : `Welcome back${AUTH.name ? ', ' + AUTH.name.split(' ')[0] : ''}`;

  const subtitle = isCreate ? 'Choose a 4-digit PIN to secure your FlowAI'
                 : isConfirm ? 'Enter your PIN again to confirm'
                 : 'Enter your PIN to continue';

  const filledCount = _pin.length;

  document.getElementById('root').innerHTML = `
    <div class="login-screen" id="login-screen">
      <div class="login-logo" style="position:relative;z-index:1">FlowAI</div>
      <div class="login-tagline" style="position:relative;z-index:1">Beat procrastination with AI</div>

      <div class="login-card">
        ${isCreate ? `
          <div style="margin-bottom:16px">
            <label>Your name</label>
            <input id="login-name" placeholder="e.g. Ishaan" value="${_pinName}"
              oninput="_pinName=this.value" style="font-size:15px"/>
          </div>
        ` : ''}

        <div style="text-align:center">
          <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">${title}</div>
          <div style="font-size:13px;color:var(--text3);margin-bottom:4px">${subtitle}</div>
          ${_pinError ? `<div style="font-size:12px;color:var(--coral);margin-top:4px">${_pinError}</div>` : ''}
        </div>

        <div class="pin-dots" id="pin-dots">
          ${[0,1,2,3].map(i => `
            <div class="pin-dot ${i < filledCount ? 'filled' : ''} ${_pinError ? 'error' : ''}" id="dot-${i}"></div>
          `).join('')}
        </div>

        <div class="numpad">
          ${[1,2,3,4,5,6,7,8,9].map(n => `
            <button class="numpad-btn" onclick="pinPress(${n})">${n}</button>
          `).join('')}
          <button class="numpad-btn empty"></button>
          <button class="numpad-btn" onclick="pinPress(0)">0</button>
          <button class="numpad-btn del" onclick="pinDel()">⌫</button>
        </div>

        ${isEnter ? `
          <div style="text-align:center;margin-top:16px">
            <button class="btn-ghost btn-sm" style="font-size:12px;color:var(--text3)" onclick="forgotPin()">Forgot PIN? Reset app</button>
          </div>
        ` : ''}
      </div>
    </div>`;
}

function pinPress(digit) {
  if (_pin.length >= 4) return;
  _pinError = '';
  _pin += digit;
  updatePinDots();
  if (_pin.length === 4) {
    setTimeout(() => handlePinComplete(), 120);
  }
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) return;
    dot.className = 'pin-dot' + (i < _pin.length ? ' filled' : '') + (_pinError ? ' error' : '');
  }
}

function pinDel() {
  if (_pin.length > 0) {
    _pin = _pin.slice(0, -1);
    _pinError = '';
    updatePinDots();
  }
}

function handlePinComplete() {
  if (_pinMode === 'create') {
    if (_pin.length < 4) return;
    _pinConfirm = _pin;
    _pin = '';
    _pinMode = 'confirm';
    renderLogin();

  } else if (_pinMode === 'confirm') {
    if (_pin === _pinConfirm) {
      // Save PIN and name
      const name = (document.getElementById('login-name')?.value || _pinName).trim();
      AUTH.pin = hashPin(_pin);
      AUTH.name = name;
      sv('pin', AUTH.pin);
      sv('userName', name);
      startSession();
      enterApp();
    } else {
      _pinError = 'PINs don\'t match — try again';
      _pin = '';
      _pinMode = 'create';
      _pinConfirm = '';
      renderLogin();
      // Shake dots
      setTimeout(() => { _pinError = ''; renderLogin(); }, 1500);
    }

  } else if (_pinMode === 'enter') {
    if (hashPin(_pin) === AUTH.pin) {
      startSession();
      enterApp();
    } else {
      _pinError = 'Wrong PIN — try again';
      _pin = '';
      // Shake animation via re-render
      renderLogin();
      setTimeout(() => { _pinError = ''; renderLogin(); }, 1500);
    }
  }
}

function enterApp() {
  // Fade out login screen
  const ls = document.getElementById('login-screen');
  if (ls) { ls.style.opacity = '0'; setTimeout(() => render(), 400); }
  else render();
}

function forgotPin() {
  const ml=document.getElementById('modal-layer');
  ml.innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeForgot()">
      <div class="modal" style="max-width:360px;text-align:center;padding:2rem 1.75rem">
        <div style="font-size:36px;margin-bottom:12px">⚠️</div>
        <h2 style="font-size:18px;margin-bottom:8px">Reset FlowAI?</h2>
        <p style="font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6">
          This will permanently delete your PIN, all tasks, and all data. This cannot be undone.
        </p>
        <div style="display:flex;gap:10px;justify-content:center">
          <button style="flex:1;max-width:140px" onclick="closeForgot()">Cancel</button>
          <button class="btn-coral" style="flex:1;max-width:140px;background:rgba(255,107,107,0.15)"
            onclick="confirmReset()">Reset app</button>
        </div>
      </div>
    </div>`;
}
window.confirmReset=function(){localStorage.clear();location.reload();};
window.closeForgot=function(){document.getElementById('modal-layer').innerHTML='';};

window.pinPress = pinPress;
window.pinDel = pinDel;
window.forgotPin = forgotPin;

function lockApp() {
  AUTH.session = 0;
  sv('session', 0);
  _pin = '';
  _pinMode = 'enter';
  _pinError = '';
  renderLogin();
}
window.lockApp = lockApp;

/* ── Boot: show login or app ── */
if (isSessionValid()) {
  render(); // session still active — go straight to app
} else {
  renderLogin(); // show login screen
}
</script>
</body>
</html>
